version: '3.8'

services:
  # ==================== RuoYi-AI 前端服务 ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ruoyi-ai-web
    restart: always
    ports:
      - "5137:5137"
    environment:
      # 后端 API 地址 - 运行时通过 nginx 代理
      # 在完整 docker-compose 中应设置为: http://backend:6039
      # 独立运行时可设置为实际后端地址
      UPSTREAM_URL: http://host.docker.internal:26039
    networks:
      - ruoyi-net

# ==================== 网络配置 ====================
networks:
  ruoyi-net:
    driver: bridge
